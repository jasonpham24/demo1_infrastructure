stages:
  - validate
  - plan
  - apply
  - configure

variables:
  TF_DIR: "terraform"
  ANSIBLE_DIR: "ansible"

cache:
  key: terraform-cache
  paths:
    - ${TF_DIR}/.terraform/

# Validate Stage: Formats check and syntactical verification
terraform_validate:
  stage: validate
  image: hashicorp/terraform:1.6.0
  before_script:
    - cd ${TF_DIR}
  script:
    - terraform init -backend=false
    - terraform validate

# Plan Stage: Dry-run and create plan artifact
terraform_plan:
  stage: plan
  image: hashicorp/terraform:1.6.0
  before_script:
    - cd ${TF_DIR}
  script:
    - terraform init
    - terraform plan -out=tfplan -var="db_password=${DB_PASSWORD}" -var="ssh_public_key=${SSH_PUBLIC_KEY}"
  artifacts:
    name: tfplan
    paths:
      - ${TF_DIR}/tfplan
    expire_in: 2 hours

# Apply Stage: Provisions infrastructure (manually triggered on main for safety)
terraform_apply:
  stage: apply
  image: hashicorp/terraform:1.6.0
  before_script:
    - cd ${TF_DIR}
  script:
    - terraform init
    - terraform apply -auto-approve tfplan
    # Extract outputs and save in dotenv report for downstream pipeline jobs
    - echo "EC2_PUBLIC_IP=$(terraform output -raw ec2_public_ip)" > ../deploy_vars.env
    - echo "RDS_ENDPOINT=$(terraform output -raw rds_address)" >> ../deploy_vars.env
    - echo "S3_BUCKET_ID=$(terraform output -raw s3_bucket_id)" >> ../deploy_vars.env
  artifacts:
    reports:
      dotenv: deploy_vars.env
  dependencies:
    - terraform_plan
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

# Configure Stage: Installs Docker, NGINX, Grafana, Prometheus, N8n
ansible_configure:
  stage: configure
  image: python:3.10-slim
  before_script:
    - apt-get update && apt-get install -y openssh-client
    - pip install ansible
    - mkdir -p ~/.ssh
    - echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
  script:
    - cd ${ANSIBLE_DIR}
    # Create dynamic hosts inventory
    - echo "[bastion]" > inventory.ini
    - echo "${EC2_PUBLIC_IP} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa" >> inventory.ini
    # Launch playbook with outputs retrieved from the terraform apply step
    - ansible-playbook -i inventory.ini playbooks/deploy.yml --extra-vars "db_host=${RDS_ENDPOINT} db_name=n8n db_user=postgres db_password=${DB_PASSWORD} ec2_public_ip=${EC2_PUBLIC_IP}"
  dependencies:
    - terraform_apply
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
